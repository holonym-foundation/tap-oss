# TAP TLS reverse proxy
# Place your TLS cert and key in deploy/certs/:
#   deploy/certs/tap.crt
#   deploy/certs/tap.key

# Rate limiting zone: 10 requests/sec per IP
limit_req_zone $binary_remote_addr zone=tap:10m rate=10r/s;

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/tap.crt;
    ssl_certificate_key /etc/nginx/certs/tap.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max request body: 10MB (matches proxy response buffer limit)
    client_max_body_size 10m;

    # Proxy to TAP
    location / {
        limit_req zone=tap burst=20 nodelay;

        proxy_pass http://proxy:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Approval requests can take up to 5 minutes
        proxy_read_timeout 310s;
        proxy_send_timeout 30s;
    }

    # Telegram webhook — no rate limiting (Telegram sends infrequently)
    location /telegram/webhook {
        proxy_pass http://proxy:3100/telegram/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check — no auth needed
    location /health {
        proxy_pass http://proxy:3100/health;
    }
}
