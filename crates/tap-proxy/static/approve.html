<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Approve Request — TAP</title>
<style>
  @font-face { font-family: 'PPHatton'; src: url('/fonts/PPHatton-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'PPHatton'; src: url('/fonts/PPHatton-Semibold.otf') format('opentype'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'SuisseIntl'; src: url('/fonts/SuisseIntl-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'SuisseIntl'; src: url('/fonts/SuisseIntl-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'SuisseIntlMono'; src: url('/fonts/SuisseIntlMono-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SuisseIntl', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #F5F9FF; color: #0A0A0A; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px; }

  .card { background: #FFFFFF; border: 1px solid #E5E5E5; border-radius: 12px;
    max-width: 480px; width: 100%; padding: 32px;
    box-shadow: 0 4px 24px rgba(23,35,94,0.08); }

  .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 24px; }
  .logo-text { display: flex; flex-direction: column; }
  .logo-wordmark { font-family: 'PPHatton', serif; font-size: 22px; font-weight: 600;
    color: #17235E; letter-spacing: -0.02em; line-height: 1; }
  .logo-sub { font-size: 10px; color: #A3A3A3; letter-spacing: 0.01em; margin-top: 2px; }

  h1 { font-family: 'PPHatton', serif; font-size: 18px; font-weight: 600;
    color: #17235E; margin-bottom: 20px; }

  .detail { margin-bottom: 14px; }
  .label { font-size: 11px; color: #737373; text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 4px; font-weight: 500; }
  .value { font-size: 14px; color: #0A0A0A; word-break: break-all; line-height: 1.4; }
  .value.mono { font-family: 'SuisseIntlMono', "SF Mono", "Fira Code", monospace; font-size: 13px;
    background: #F5F9FF; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #E5E5E5; color: #17235E; }
  .body-preview { max-height: 200px; overflow-y: auto; white-space: pre-wrap; }

  .actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn { flex: 1; padding: 11px 18px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; font-family: 'SuisseIntl', sans-serif;
    transition: opacity 0.15s; }
  .btn:hover:not(:disabled) { opacity: 0.88; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-approve { background: #4E77F4; color: #FFFFFF; }
  .btn-deny { background: #FFFFFF; border: 1px solid #E5E5E5; color: #525252; }
  .btn-deny:hover:not(:disabled) { border-color: #FC6764; color: #C51411; opacity: 1; }

  .status { text-align: center; margin-top: 14px; font-size: 13px; color: #737373;
    padding: 10px 0; line-height: 1.5; }
  .status.success { color: #16A34A; }
  .status.error { color: #C51411; }
  .status.denied { color: #D88E03; }

  .loading { text-align: center; padding: 32px 0; color: #A3A3A3; font-size: 14px; }
  .spinner { width: 22px; height: 22px; border: 2px solid #E5E5E5;
    border-top-color: #4E77F4; border-radius: 50%;
    animation: spin 0.75s linear infinite; display: inline-block; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .notice { margin-top: 18px; padding: 12px 14px; background: #F5F9FF;
    border: 1px solid #E5E5E5; border-radius: 8px; font-size: 13px;
    color: #525252; line-height: 1.6; }
  .notice a { color: #4E77F4; text-decoration: none; }
  .notice a:hover { text-decoration: underline; }
  code { font-family: 'SuisseIntlMono', monospace; font-size: 12px;
    background: #F5F5F5; padding: 1px 5px; border-radius: 4px; color: #17235E; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">
    <svg width="22" height="26" viewBox="0 0 20 23" fill="none">
      <path d="M4.5 10V7a5.5 5.5 0 0 1 11 0v3" stroke="#4E77F4" stroke-width="2" stroke-linecap="round"/>
      <rect x="1" y="10" width="18" height="12" rx="4" fill="#17235E"/>
      <circle cx="10" cy="16" r="2" fill="white" opacity="0.9"/>
      <path d="M10 18v1.5" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    </svg>
    <div class="logo-text">
      <span class="logo-wordmark">TAP</span>
      <span class="logo-sub">by human.tech</span>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading request details…</p>
  </div>

  <div id="content" style="display:none">
    <h1>Approval Request</h1>

    <div class="detail">
      <div class="label">Agent</div>
      <div class="value" id="agent"></div>
    </div>
    <div class="detail">
      <div class="label">Service</div>
      <div class="value" id="credential"></div>
    </div>
    <div class="detail">
      <div class="label">Action</div>
      <div class="value mono" id="action"></div>
    </div>
    <div class="detail" id="body-section" style="display:none">
      <div class="label">Body</div>
      <div class="value mono body-preview" id="body"></div>
    </div>

    <div id="auth-section">
      <div class="actions">
        <button class="btn btn-approve" id="approve-btn" onclick="approve()">Approve</button>
        <button class="btn btn-deny" id="deny-btn" onclick="deny()">Deny</button>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>
<script>
const pathParts = window.location.pathname.split('/');
const txnId = pathParts[pathParts.length - 1];
const API = window.location.origin;

function getAdminToken() {
  try {
    const session = JSON.parse(localStorage.getItem('agentsec_session') || 'null');
    return session?.token || '';
  } catch {
    return '';
  }
}

function authHeaders(extra = {}) {
  const token = getAdminToken();
  return token ? { ...extra, Authorization: `Bearer ${token}` } : extra;
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

function showSignInNotice(message = 'Sign in to TAP to view and approve this request.') {
  document.getElementById('content').style.display = 'none';
  document.getElementById('loading').style.display = '';
  document.getElementById('loading').innerHTML = `
    <div class="notice" style="text-align:left">
      <strong>Sign in required.</strong><br>
      ${escapeHtml(message)}<br>
      <a href="/dashboard">Open dashboard</a>
    </div>`;
}

function showAccessDeniedNotice(message = 'You are not eligible to view or approve this credential request.') {
  document.getElementById('content').style.display = 'none';
  document.getElementById('loading').style.display = '';
  document.getElementById('loading').innerHTML = `
    <div class="notice" style="text-align:left; border-color:#F4B4B2; background:#FFF6F6; color:#7F1D1D">
      <strong>Approval unavailable.</strong><br>
      ${escapeHtml(message)}<br>
      <a href="/dashboard">Back to dashboard</a>
    </div>`;
}

async function load() {
  try {
    if (!getAdminToken()) {
      showSignInNotice();
      return;
    }
    const res = await fetch(`${API}/approve/txn/${txnId}/details`, {
      cache: 'no-store',
      headers: authHeaders()
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        showSignInNotice(err.message || 'Your dashboard session has expired. Sign in to TAP to view this request.');
        return;
      }
      if (res.status === 403) {
        showAccessDeniedNotice(err.message);
        return;
      }
      if (res.status === 404 || res.status === 410) {
        throw new Error(err.message || 'This approval request has expired or was already resolved.');
      }
      throw new Error(err.message || err.error || `Server error (${res.status}) — try reloading the page.`);
    }
    const data = await res.json();
    document.getElementById('agent').textContent = data.agent_id;
    document.getElementById('credential').textContent = data.credential_name;
    document.getElementById('action').textContent = `${data.method} ${data.target_url}`;
    if (data.body_preview) {
      document.getElementById('body').textContent = data.body_preview;
      document.getElementById('body-section').style.display = '';
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = '';

    if (!data.has_passkeys) {
      showNoPasskeysNotice();
    }
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#C51411">${escapeHtml(e.message)}</p>`;
  }
}

function showNoPasskeysNotice() {
  const section = document.getElementById('auth-section');
  section.innerHTML = `
    <div class="notice">
      <strong>No passkey registered for your signed-in account.</strong><br>
      Register a passkey while signed in as this team member, then return to approve this request.
      <a href="/approve/register">Register passkey</a>
    </div>
    <div class="actions" style="margin-top:16px">
      <button class="btn btn-deny" id="deny-btn" onclick="deny()">Deny</button>
    </div>`;
}

async function approve() {
  const btn = document.getElementById('approve-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Starting biometric verification…';
  status.className = 'status';

  try {
    const beginRes = await fetch(`${API}/approve/txn/${txnId}/begin`, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({})
    });
    if (!beginRes.ok) {
      const err = await beginRes.json().catch(() => ({}));
      if (beginRes.status === 401) {
        showSignInNotice(err.message || 'Your dashboard session has expired. Sign in to TAP to approve this request.');
        return;
      }
      if (beginRes.status === 403) {
        status.textContent = err.message || 'You are not eligible to approve this request.';
        status.className = 'status error';
        btn.disabled = true;
        return;
      }
      if (err.error === 'no_credentials') {
        showNoPasskeysNotice();
        status.textContent = '';
        return;
      }
      if (beginRes.status === 410 && err.error === 'session_expired') {
        status.textContent = err.message || 'This request has expired. Please ask the agent to retry.';
        status.className = 'status error';
        btn.disabled = true;
        return;
      }
      throw new Error(err.message || err.error || `HTTP ${beginRes.status}`);
    }
    const options = await beginRes.json();

    status.textContent = 'Touch your security key or use biometric…';
    const getPubKey = {
      ...options.publicKey,
      challenge: base64urlToBuffer(options.publicKey.challenge),
    };
    if (getPubKey.allowCredentials) {
      getPubKey.allowCredentials = getPubKey.allowCredentials.map(c => ({
        ...c, id: base64urlToBuffer(c.id),
      }));
    }
    const credential = await navigator.credentials.get({ publicKey: getPubKey });

    const finishRes = await fetch(`${API}/approve/txn/${txnId}/finish`, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({
        id: credential.id,
        rawId: bufToBase64url(credential.rawId),
        type: credential.type,
        response: {
          authenticatorData: bufToBase64url(credential.response.authenticatorData),
          clientDataJSON: bufToBase64url(credential.response.clientDataJSON),
          signature: bufToBase64url(credential.response.signature),
          userHandle: credential.response.userHandle
            ? bufToBase64url(credential.response.userHandle) : null
        }
      })
    });
    if (!finishRes.ok) {
      const errBody = await finishRes.json().catch(() => null);
      if (finishRes.status === 410 && errBody?.error === 'session_expired') {
        status.textContent = errBody.message || 'This request has expired. Please ask the agent to retry.';
        status.className = 'status error';
        btn.disabled = true;
        return;
      }
      if (finishRes.status === 403 && errBody?.error === 'not_authorized') {
        status.textContent = errBody.message || 'You are not eligible to approve this request.';
        status.className = 'status error';
        btn.disabled = false;
        return;
      }
      if (finishRes.status === 409 && errBody?.error === 'stale_challenge') {
        status.textContent = errBody.message || 'Verification state expired. Try approving again.';
        status.className = 'status error';
        btn.disabled = false;
        return;
      }
      throw new Error(errBody?.message || errBody?.error || `HTTP ${finishRes.status}`);
    }

    const result = await finishRes.json();
    status.innerHTML = `${escapeHtml(result.approver ? `Approved by ${result.approver}` : 'Approved')} — redirecting…`;
    status.className = 'status success';
    btn.textContent = 'Approved ✓';
    document.getElementById('deny-btn').disabled = true;
    setTimeout(() => { window.location.href = '/dashboard#/approvals'; }, 1200);
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      status.textContent = 'Cancelled. Try again.';
      btn.disabled = false;
    } else {
      status.textContent = `Error: ${e.message}`;
      status.className = 'status error';
      btn.disabled = false;
    }
  }
}

async function deny() {
  const btns = ['deny-btn'].map(id => document.getElementById(id)).filter(Boolean);
  btns.forEach(b => { b.disabled = true; });
  try {
    const res = await fetch(`${API}/approve/txn/${txnId}/deny`, {
      method: 'POST',
      headers: authHeaders()
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        showSignInNotice(err.message || 'Your dashboard session has expired. Sign in to TAP to deny this request.');
        return;
      }
      throw new Error(err.message || err.error || `HTTP ${res.status}`);
    }
    document.getElementById('status').innerHTML = 'Denied — redirecting…';
    document.getElementById('status').className = 'status denied';
    setTimeout(() => { window.location.href = '/dashboard#/approvals'; }, 1200);
    const approveBtn = document.getElementById('approve-btn');
    if (approveBtn) approveBtn.disabled = true;
  } catch (e) {
    document.getElementById('status').textContent = `Error: ${e.message}`;
    btns.forEach(b => { b.disabled = false; });
  }
}

function bufToBase64url(buf) {
  const bytes = new Uint8Array(buf);
  let str = '';
  bytes.forEach(b => str += String.fromCharCode(b));
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function base64urlToBuffer(b64url) {
  const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

load();
</script>
</body>
</html>
